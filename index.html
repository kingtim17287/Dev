<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingTim17287 | Roblox Game Developer</title>
    <meta name="description" content="Jetpack over LAVA, Dead Meals, 99 Nights Zombie Tower Defense and more!">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #3b82f6; --bg: #0b1120; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); scroll-behavior: smooth; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .img-container { aspect-ratio: 16/9; overflow: hidden; background: #111; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .group:hover .img-container img { transform: scale(1.05); }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .avatar-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="antialiased">

<script>
    const portfolioConfig = {
        userId: "3808496324",
        name: "KingTim17287",
        accentHex: "#3b82f6",
        manualGames: [106988495261000, 77942507005261, 95744979554149, 104877476991790, 14044594226, 82126039807655, 101246660655753, 108311894104237],
        extraProjects: [
            { name: "Boden Interactive", desc: "Official Group - Join for updates & events!", link: "https://www.roblox.com/communities/426353491/Boden-Interactive#!/about" },
            { name: "Woven Productions", desc: "Official Group - Join for updates & events!", link: "https://www.roblox.com/communities/7457551/Woven-Productions#!/about" },
            { name: "StarWoven Productions", desc: "Official Group - Join for updates & events!", link: "https://www.roblox.com/communities/35252165/StarWoven-Productions#!/about" }
        ]
    };
</script>

<nav class="fixed top-0 w-full z-50 py-5 px-6 glass">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <span id="nav-name" class="font-black text-3xl italic uppercase tracking-tighter" style="color:var(--accent)">KINGTIM17287</span>
    </div>
</nav>

<div class="pt-32 pb-20 px-6 max-w-6xl mx-auto">

    <!-- AVATAR -->
    <div class="text-center mb-12">
        <img id="avatar-img" class="w-64 h-64 mx-auto rounded-full border-8 shadow-2xl avatar-float" style="border-color:var(--accent)" alt="Avatar">
    </div>

    <!-- TOTAL STATS -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-16">
        <div class="stat-card rounded-3xl p-8 text-center">
            <div id="total-playing" class="text-6xl font-black italic text-emerald-400">0</div>
            <p class="uppercase text-sm tracking-widest text-emerald-400/80 mt-2">PLAYERS PLAYING MY GAMES</p>
        </div>
        <div class="stat-card rounded-3xl p-8 text-center">
            <div id="total-visits" class="text-6xl font-black italic text-blue-400">0</div>
            <p class="uppercase text-sm tracking-widest text-blue-400/80 mt-2">TOTAL VISITS</p>
        </div>
    </div>

    <!-- MY WORK -->
    <section id="work">
        <div class="flex items-center gap-3 mb-8">
            <div class="h-8 w-2" style="background:var(--accent)"></div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">MY WORK</h2>
        </div>
        <div id="work-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="mt-20">
        <h2 class="text-4xl font-black italic uppercase text-center tracking-tighter mb-8">LET'S <span style="color:var(--accent)">CONNECT</span></h2>
        <div id="links-grid" class="max-w-xl mx-auto space-y-4"></div>
    </section>
</div>

<footer class="glass py-8 text-center text-xs font-bold">© 2026 KingTim17287 • Template by UN6107617</footer>

<script>
    function init() {
        const cfg = portfolioConfig;
        document.documentElement.style.setProperty('--accent', cfg.accentHex);
        document.getElementById('nav-name').innerText = cfg.name;

        // Render links
        const linksHTML = `
            <a href="https://www.roblox.com/users/3808496324/profile" target="_blank" class="glass p-6 rounded-3xl flex justify-between items-center hover:bg-white/10">
                <span class="font-black uppercase text-xl">ROBLOX</span><span style="color:var(--accent)">→</span>
            </a>
            <a href="https://github.com/kingtim17287" target="_blank" class="glass p-6 rounded-3xl flex justify-between items-center hover:bg-white/10">
                <span class="font-black uppercase text-xl">GITHUB</span><span style="color:var(--accent)">→</span>
            </a>`;
        document.getElementById('links-grid').innerHTML = linksHTML;

        fetchRoblox(cfg.userId);
    }

    async function fetchRoblox(uid) {
        try {
            const res = await fetch(`https://api.un6107617.dev/portfolio/${uid}`);
            const data = await res.json();

            if (!data.success) throw new Error("API error");

            // Avatar
            document.getElementById('avatar-img').src = data.user.avatar;

            const grid = document.getElementById('work-grid');
            let html = '';

            // Groups first
            portfolioConfig.extraProjects.forEach(g => {
                html += `
                <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                    <div class="img-container"><img src="https://www.roblox.com/asset/?id=0" onerror="this.src='https://placehold.co/600x338'"></div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black mb-2">${g.name}</h3>
                        <p class="opacity-70 mb-6">${g.desc}</p>
                        <a href="${g.link}" target="_blank" class="font-black text-xs uppercase block text-center" style="color:var(--accent)">JOIN GROUP →</a>
                    </div>
                </div>`;
            });

            // Only the 8 games you listed
            const allowedPlaceIds = new Set(portfolioConfig.manualGames);
            const filteredGames = data.games.filter(g => allowedPlaceIds.has(Number(g.placeId)));

            filteredGames.forEach(g => {
                html += `
                <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                    <div class="img-container"><img src="${g.thumbnail}"></div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black mb-2">${g.name}</h3>
                        <p class="opacity-70 mb-6">${g.description || 'No description'}</p>
                        <a href="https://www.roblox.com/games/${g.placeId}" target="_blank" class="font-black text-xs uppercase block text-center" style="color:var(--accent)">PLAY →</a>
                    </div>
                </div>`;
            });

            grid.innerHTML = html;

            // Simple total stats (from the API if available, otherwise 0)
            const totalPlaying = filteredGames.reduce((sum, g) => sum + (g.playing || 0), 0);
            const totalVisits = filteredGames.reduce((sum, g) => sum + (g.visits || 0), 0);
            document.getElementById('total-playing').innerText = totalPlaying;
            document.getElementById('total-visits').innerText = totalVisits;

        } catch (e) {
            console.error(e);
            document.getElementById('work-grid').innerHTML = `<p class="text-red-400 text-center py-12">Could not load games — refresh the page.</p>`;
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
