<nav class="fixed top-0 w-full z-50 py-3 md:py-5 px-4 md:px-6 glass">

<div class="pt-32 md:pt-40 pb-20 px-5 md:px-6 max-w-6xl mx-auto min-h-screen">

    <!-- BIG AVATAR AT THE TOP -->

        <div id="avatar-container" class="relative inline-block mx-auto avatar-container">
            <img id="avatar-img" src="https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=3808496324&size=420x420&format=Png&isCircular=true" 
                 class="w-48 h-48 md:w-64 md:h-64 rounded-full border-8 shadow-2xl" style="border-color: var(--accent);">

    <!-- TOP TOTAL STATS -->

        </div>

            <div id="total-visits" class="text-6xl font-black italic text-blue-400">0</div>

<footer class="glass mt-20 border-t border-white/5 py-10 text-center text-xs font-bold tracking-widest">
    © 2026 KingTim17287 • Template by UN6107617
</footer>

<script>
    function toggleMenu() { /* mobile menu logic */ }

    async function fetchMyGames() {
        const cfg = portfolioConfig;
        const placeIds = cfg.manualGames.map(g => g.placeId).join(',');

        try {
            // Get place details + universe IDs
            const detailsRes = await fetch(`https://games.roproxy.com/v1/games/multiget-place-details?placeIds=${placeIds}`);
            const details = await detailsRes.json();

            // Get thumbnails
            const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/places/icons?placeIds=${placeIds}&size=512x512&format=Png`);
            const thumbs = await thumbRes.json();

            // Get live stats
            const universeIds = details.data.map(p => p.universeId).join(',');
            const statsRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${universeIds}`);
            const statsData = await statsRes.json();

            let totalPlaying = 0;
            let totalVisits = 0;

            const gamesHtml = details.data.map((p, i) => {
                const stat = statsData.data.find(s => s.universeId === p.universeId) || { playing: 0, visits: 0 };
                const thumb = thumbs.data.find(t => t.targetId === p.placeId) || {};
                totalPlaying += stat.playing || 0;
                totalVisits += stat.visits || 0;

                return `
                <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                    <div class="img-container"><img src="${thumb.imageUrl}" alt="${p.name}"></div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black mb-2 italic uppercase">${p.name}</h3>
                        <p class="desc-truncate text-sm opacity-70 mb-6">${p.description || 'No description'}</p>
                        <div class="flex justify-between text-xs mb-6">
                            <div>CCU <span class="font-black text-emerald-400">${stat.playing.toLocaleString()}</span></div>
                            <div>Visits <span class="font-black text-blue-400">${stat.visits.toLocaleString()}</span></div>
                        </div>
                        <a href="https://www.roblox.com/games/${p.placeId}" target="_blank" class="font-black text-xs uppercase block text-center" style="color:var(--accent)">PLAY →</a>
                    </div>
                </div>`;
            }).join('');

            // Groups
            const groupsHtml = cfg.extraProjects.map(g => `
                <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                    <div class="img-container"><img src="${g.image}" onerror="this.src='https://www.roblox.com/asset/?id=0'"></div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black mb-2 italic uppercase">${g.name}</h3>
                        <p class="desc-truncate text-sm opacity-70 mb-6">${g.desc}</p>
                        <a href="${g.link}" target="_blank" class="font-black text-xs uppercase block text-center" style="color:var(--accent)">JOIN GROUP →</a>
                    </div>
                </div>`).join('');

            document.getElementById('work-grid').innerHTML = groupsHtml + gamesHtml;
            document.getElementById('total-playing').innerText = totalPlaying.toLocaleString();
            document.getElementById('total-visits').innerText = totalVisits.toLocaleString();

        } catch (e) {
            console.error(e);
            document.getElementById('work-grid').innerHTML = `<p class="text-center text-red-400 py-12">Could not load games. Please make sure the site is hosted on GitHub Pages and try refreshing.</p>`;
        }
    }

    function init() {
        const cfg = portfolioConfig;
        document.documentElement.style.setProperty('--accent', cfg.accentHex);
        document.getElementById('nav-name').innerText = cfg.name.toUpperCase();
        document.getElementById('avatar-img').src = `https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${cfg.userId}&size=420x420&format=Png&isCircular=true`;

        // Render links
        const grid = document.getElementById('links-grid');
        Object.entries(cfg.links).forEach(([label, url]) => {
            const a = document.createElement('a');
            a.href = url; a.target = "_blank";
            a.className = "glass p-6 rounded-3xl flex justify-between items-center hover:bg-white/10 transition-all";
            a.innerHTML = `<span class="font-black uppercase text-xl">${label}</span><span style="color:var(--accent)">→</span>`;
            grid.appendChild(a);
        });

        fetchMyGames();
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
