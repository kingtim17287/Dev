<script>
    // Mobile menu (unchanged)
    function toggleMenu() {
        const menu = document.getElementById('mobile-menu');
        const icon = document.getElementById('menu-icon');
        menu.classList.toggle('hidden');
        icon.style.transform = menu.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(90deg)';
    }

    function initPortfolio() {
        const cfg = portfolioConfig;
        
        // Apply colors & UI
        document.documentElement.style.setProperty('--accent', cfg.accentHex);
        document.documentElement.style.setProperty('--bg', cfg.backgroundColor);
        document.documentElement.style.setProperty('--text', cfg.textColor);
        
        document.title = cfg.seoTitle;
        document.getElementById('meta-desc').content = cfg.seoDescription;
        document.getElementById('og-title').content = cfg.seoTitle;
        document.getElementById('og-desc').content = cfg.seoDescription;

        document.getElementById('nav-name').innerText = cfg.name;
        document.getElementById('footer-name').innerText = cfg.name;
        document.getElementById('main-title').innerText = cfg.title;
        document.getElementById('main-bio').innerText = cfg.bio;
        document.getElementById('copyright').innerText = `Roblox Developer Portfolio © ${new Date().getFullYear()}`;

        const hire = document.getElementById('hire-status');
        hire.innerText = cfg.forHire === 'Yes' ? "For Hire: Available" : "For Hire: Busy";
        hire.className = `text-[8px] md:text-[10px] border px-2 py-1 rounded font-bold uppercase tracking-widest leading-none ${cfg.forHire === 'Yes' ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border-amber-500/30'}`;

        const avatar = document.getElementById('avatar-container');
        cfg.avatarAnimation === 'Yes' ? avatar.classList.add('animate-bounce-slow') : avatar.classList.remove('animate-bounce-slow');

        // Render stack & links (unchanged)
        const tGrid = document.getElementById('tools-grid');
        tGrid.innerHTML = '';
        Object.entries(cfg.tools).forEach(([name, data]) => {
            const div = document.createElement('div');
            div.className = "glass p-6 rounded-2xl border border-white/5 uppercase font-black italic text-sm transition-all hover:scale-105 cursor-pointer";
            div.innerText = name;
            div.onclick = () => showToolDetail(name, data.years, data.desc);
            tGrid.appendChild(div);
        });

        const lGrid = document.getElementById('links-grid');
        lGrid.innerHTML = '';
        Object.entries(cfg.links).forEach(([label, url]) => {
            const a = document.createElement('a');
            a.href = url; a.target = "_blank";
            a.className = "glass p-6 rounded-2xl flex justify-between items-center group hover:bg-white/5 transition-all";
            a.innerHTML = `<span class="font-black italic uppercase text-xl">${label}</span><span style="color:var(--accent)">→</span>`;
            lGrid.appendChild(a);
        });

        fetchRoblox(cfg.userId);
    }

    // UPDATED FETCH - uses the original API + extra roproxy fetch for LIVE CCU / VISITS / SESSIONS
    async function fetchRoblox(uid) {
        if (!uid) return;

        try {
            // 1. Get avatar & basic data from the original proxy (fast & reliable)
            const res = await fetch(`https://api.un6107617.dev/portfolio/${uid}`);
            const data = await res.json();

            if (data.success) {
                // Avatar
                document.getElementById('avatar-img').src = data.user.avatar;

                // SEO images
                const finalFavicon = portfolioConfig.seoFavicon || data.user.avatar;
                const finalOgImg = portfolioConfig.seoImage || data.user.avatar;
                document.getElementById('favicon').href = finalFavicon;
                document.getElementById('og-img').content = finalOgImg;

                // 2. Render games + extra projects (your groups)
                const grid = document.getElementById('work-grid');
                let html = "";

                // Extra projects (your 3 groups)
                if (portfolioConfig.extraProjects && portfolioConfig.extraProjects.length > 0) {
                    html += portfolioConfig.extraProjects.map(p => `
                        <div class="glass rounded-[1.5rem] md:rounded-[2rem] overflow-hidden flex flex-col group border border-white/5">
                            <div class="img-container"><img src="${p.image}" onerror="this.src='https://www.roblox.com/asset/?id=0'"></div>
                            <div class="p-6 md:p-8 text-left">
                                <h3 class="text-2xl md:text-3xl font-black mb-2 italic uppercase tracking-tighter text-white">${p.name}</h3>
                                <p class="opacity-60 text-sm italic mb-6 desc-truncate">${p.desc}</p>
                                <a href="${p.link}" target="_blank" class="font-black text-xs uppercase" style="color:var(--accent)">Join Group →</a>
                            </div>
                        </div>`).join('');
                }

                // Roblox games from the API
                html += data.games.map(g => `
                    <div class="glass rounded-[1.5rem] md:rounded-[2rem] overflow-hidden flex flex-col group border border-white/5">
                        <div class="img-container"><img src="${g.thumbnail}"></div>
                        <div class="p-6 md:p-8 text-left">
                            <h3 class="text-2xl md:text-3xl font-black mb-2 italic uppercase tracking-tighter text-white">${g.name}</h3>
                            <p class="opacity-60 text-sm italic mb-6 desc-truncate">${g.description || 'No description provided.'}</p>
                            <a href="https://www.roblox.com/games/${g.placeId}" target="_blank" class="font-black text-xs uppercase" style="color:var(--accent)">Launch Experience →</a>
                        </div>
                    </div>`).join('');

                grid.innerHTML = html;
            }

            // 3. Fetch LIVE STATS (CCU + visits + sessions) using roproxy (no CORS issues)
            await fetchLiveStats(uid);

        } catch (e) {
            console.error("API Fetch failed:", e);
        }
    }

    // LIVE STATS FETCH (exactly what xyrx.dev used)
    async function fetchLiveStats(uid) {
        try {
            // Get all universes for the user
            const gamesRes = await fetch(`https://games.roproxy.com/v2/users/${uid}/games?limit=100&sortOrder=Desc`);
            const gamesData = await gamesRes.json();

            if (!gamesData.data || gamesData.data.length === 0) return;

            const universeIds = gamesData.data.map(g => g.universeId).join(',');

            // Get detailed stats for all universes at once
            const statsRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${universeIds}`);
            const statsData = await statsRes.json();

            let totalCCU = 0;
            let totalVisits = 0;
            let totalSessions = 0;

            statsData.data.forEach(game => {
                totalCCU += game.playing || 0;
                totalVisits += game.visits || 0;
                totalSessions += game.playing || 0; // Play sessions often uses the same "playing" value in simple portfolios
            });

            // Update the stats cards
            document.getElementById('ccu-count').innerText = totalCCU.toLocaleString();
            document.getElementById('visits-count').innerText = totalVisits.toLocaleString();
            document.getElementById('sessions-count').innerText = totalSessions.toLocaleString();

        } catch (e) {
            console.error("Live stats fetch failed (this is optional):", e);
            // fallback to 0s if roproxy ever goes down
        }
    }

    // Tool modal (unchanged)
    function showToolDetail(n, y, d) {
        const modal = document.getElementById('toolModal');
        if(!modal) return;
        document.getElementById('modalTitle').innerText = n;
        document.getElementById('modalYears').innerText = y;
        document.getElementById('modalDesc').innerText = d;
        modal.classList.remove('hidden');
        setTimeout(() => document.getElementById('modalContent').classList.add('scale-100'), 10);
    }

    function closeToolModal() {
        document.getElementById('modalContent').classList.remove('scale-100');
        setTimeout(() => document.getElementById('toolModal').classList.add('hidden'), 200);
    }

    document.addEventListener('DOMContentLoaded', initPortfolio);
</script>
